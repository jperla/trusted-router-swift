name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags:
      - "*"

jobs:
  macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: swift test

  linux:
    runs-on: ubuntu-latest
    container: swift:6.2-noble
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: swift test
